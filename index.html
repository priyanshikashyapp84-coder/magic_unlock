<!DOCTYPE html>
<html lang="en">
<head>

<style>

#nextBtn{

    margin-top:20px;

    background: linear-gradient(
    135deg,
    #7c3aed,
    #a855f7);

    color: white;

    border: 1px solid #c084fc;

    padding: 14px 34px;

    border-radius: 14px;

    font-size: 18px;

    font-weight: bold;

    cursor: pointer;

    box-shadow:
    0 0 20px rgba(168,85,247,0.6);

    transition: 0.3s;
}

#nextBtn:hover{

    transform: scale(1.08);

    box-shadow:
    0 0 35px rgba(192,132,252,0.9);
}

</style>

</head>
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div style="height:100vh;
background:#0f172a; display:flex;
flex-direction:column;
justify-content:center;
align-items:center;">

    <h1 style="color:white;
font-size:48px;">
        Magical Pattern
    </h1>

    <p id="stepText" style="color:#c4b5fd:
    font-size:20px;">
        Step 1
    </p>

    <canvas id="patternCanvas"
     width="500"
     height="500"
     style="
         margin-top:20px;
         border:2px solid #7c3aed;
         border-radius:20px;
         background:#12091f;
">
    </canvas>
    <button id="nextBtn">
        Next
    </button>
</div>

<script>

let step = 1;
let rotation = 0;
let particleOffset = 0;
let pulse = 0;
let unlocked = false;
const magicSound =
new Audio("magic_sound.mp3");

const progressionSound = new
Audio("progression_sound.mp3");

magicSound.volume = 0.8

let textOpacity = 0;
let flashSize = 0;
const canvas=
document.getElementById("patternCanvas")
;
const ctx = canvas.getContext("2d");
function drawCanvas() {

     ctx.clearRect(0, 0, 500, 500,);
let gradient = ctx.createRadialGradient(
    250, 250, 50,
    250, 250, 250
);

  gradient.addColorStop(0, "#4a1d52");

  gradient.addColorStop(0.5, "#2a1035");

  gradient.addColorStop(1, "#120016");

  ctx.fillStyle = gradient;

  ctx.fillRect(0, 0, 500, 500);

     ctx.beginPath();

     ctx.arc(250, 250, 100, 0, Math.PI * 2);
     ctx.strokeStyle = "#a855f7",
     ctx.lineWidth = 5;

     ctx.stroke();

     ctx.beginPath();

    ctx.arc(
    250,
    250,
    unlocked ? 25 + Math.sin(pulse) * 10 :
    25,
    0,
    Math.PI * 2
    );

    ctx.shadowColor = "#c084fc";

    ctx.shadowBlur = 30;
    pulse += 0.03;

    ctx.fillStyle = unlocked ? "#ffffff" : "#c084fc";

    ctx.fill();

    ctx.beginPath();

    ctx.arc(250, 250, 40 + Math.sin(pulse) * 5, 0, Math.PI * 2);

    ctx.strokeStyle =
    "rgba(255,255,255,0.3)";

    ctx.lineWidth = 2;

    ctx.stroke();

    ctx.shadowBlur = 0;
    pulse += 0.05;

    ctx.save();

    ctx.translate(250, 250);

    ctx.rotate(rotation);

    ctx.beginPath();

    ctx.arc(0, 0, 45, 0, Math.PI * 1.5);

    ctx.strokeStyle = "#e9d5ff";

    ctx.lineWidth = 3;

    ctx.stroke();

    ctx.beginPath();

    ctx.arc(250, 250, 130, 0, Math.PI * 2);

    ctx.strokeStyle = unlocked ? "#ffffff" : "#f5d0fe";

    ctx.lineWidth = 2;

    ctx.stroke();

    ctx.beginPath();

    ctx.arc(250, 250, 160, 0, Math.PI * 2);

    ctx.strokeStyle = unlocked ? "#f9a8d4" : "#c084fc";

    ctx.lineWidth = 1;

    ctx.stroke();

for(let i = 0; i < 16; i++) {

    let angle = (Math.PI * 2 / 16) * i;

    let x = 250 + Math.cos(angle) * 160;

    let y = 250 + Math.sin(angle) * 160;

    ctx.beginPath();

    ctx.arc(x, y, 5, 0, Math.PI * 2);

    ctx.shadowColor = "#f5d0fe";

    ctx.shadowBlur = 25;

    ctx.fillStyle = "#f5d0fe";

    ctx.fill();
    ctx.shadowBlur = 0;
}

    ctx.restore();

    rotation += unlocked ? 0.03 : 0.01;
for(let i = 0; i < 8; i++) {

    let angle = (Math.PI * 2 / 8) * i;

    let x = 250 + Math.cos(angle) * 70;

    let y = 250 + Math.sin(angle) * 70;

    ctx.beginPath();

    ctx.ellipse(x, y, 12, 24, angle, 0,
    Math.PI * 2);

    ctx.shadowColor = "#f9a8d4";

    ctx.shadowBlur = 15;
    ctx.strokeStyle = "#f9a8d4";

    ctx.lineWidth = 2;

    ctx.stroke();
    ctx.shadowBlur = 0;

}
for(let i = 0; i < 12; i++) {

    let angle = (Math.PI * 2 / 12) * i;

    let x = 250 + Math.cos(angle) * 95;

    let y = 250 + Math.sin(angle) * 95;

    ctx.beginPath();

    ctx.arc(x, y, 6, 0, Math.PI * 2);

    ctx.shadowColor = "#fbcfe8";

    ctx.shadowBlur = 12;

    ctx.fillStyle = "#fbcfe8";

    ctx.fill();

    ctx.shadowBlur = 0;

}

for(let i = 0; i < 20; i++){

    let angle = (Math.PI * 2 / 20) * i +
    particleOffset;

    let distance = 70 +
    Math.sin(particleOffset + i) * 10;

    let x = 250+ Math.cos(angle) * distance;

    let y = 250 + Math.sin(angle) * distance;

    ctx.beginPath();

    ctx.arc(x, y, 2, 0, Math.PI * 2);

    ctx.fillStyle = "#f5d0fe";

    ctx.fill();
}
particleOffset += 0.002;

let points = [];

     for(let i = 0; i < 12; i++) {

     let active = i < step;

     let angle = (Math.PI * 2 / 12) *
i;

     let x = 250 + Math.cos(angle) *
100;
     let y = 250 + Math.sin(angle) *
100;
points.push({x, y});

     ctx.beginPath();

     ctx.arc(x, y, 10, 0, Math.PI * 2);

      ctx.fillStyle = active ?
"#ffffff" : "#c084fc";

if(active){

     ctx.shadowColor = "#ffffff";

     ctx.shadowBlur = 20;

} else {

    ctx.shadowBlur = 0;

}

      ctx.fill();
      ctx.beginPath();

      ctx.arc(x, y - 8, 4, 0, Math.PI * 2);

      ctx.shadowColor = "#f9a8d4";

      ctx.shadowBlur = 10;

      ctx.fillStyle = "#f9a8d4";

      ctx.fill();

      ctx.shadowBlur = 0;
   }

for(let i = 0; i < step - 1; i++) {

     let p1 = points[i];
     let p2 = points[i + 1];

     if(!p1 || !p2) continue;

     ctx.beginPath();

     ctx.moveTo(p1.x, p1.y);

     ctx.lineTo(p2.x, p2.y);

     ctx.strokeStyle = "#ffffff";

     ctx.lineWidth = 3;

     ctx.stroke();
}

if(unlocked){

   ctx.beginPath();

   ctx.arc(250, 250, flashSize, 0,
Math.PI * 2);

   ctx.strokeStyle =
   `rgba(255,255,255,${
   1 - flashSize / 300
   })`;

   ctx.lineWidth = 8;

   ctx.stroke();

   flashSize += 6;

   if(flashSize > 300){

      flashSize = 0;
   }
}

if(unlocked){
   ctx.save();

   ctx.font = "bold 28px Arial";

   ctx.textAlign = "center";

   ctx.fillStyle =
   `rgba(255,255,255,${textOpacity})`;

   ctx.shadowColor = "#ffffff";

   ctx.shadowBlur = 35;

   ctx.fillText("MAGIC UNLOCKED", 250,
   440);

   ctx.shadowBlur = 0;

   if(textOpacity < 1){

       textOpacity += 0.008;
       ctx.restore();
   }
}

}

const stepText =
document.getElementById("stepText");

const nextBtn =
document.getElementById("nextBtn");

const soundSteps = [
  0.0,
  0.4,
  0.8,
  1.3,
  1.9,
  2.6,
  3.4,
  4.3,
  5.4,
  6.7,
  8.2,
  10.0,
];

nextBtn.addEventListener("click", () =>
{

    step++;

    if(step <= 3){

       progressionSound.currentTime = 0;

    }
    else if(step <= 6){

        progressionSound.currentTime = 6;

    }
    else{

       progressionSound.currentTime = 11;

    }

    progressionSound.play();

      if(step < 12){

         setTimeout(() => {

            magicSound.pause();

         }, 220);
      }

    stepText.textContent = "Step " +
step;

     drawCanvas();

     nextBtn.style.transform =
"scale(0.95)";

     setTimeout(() => {

       nextBtn.style.transform =
"scale(1)";

    }, 100);

     if(step >= 12){

        unlocked = true;

        console.log("sound playing");

        magicSound.play();

        document.body.style.background =
        "radial-gradient(circle, #4c1d95, #000000)";

        nextBtn.textContent =
"Unlocked";
    }

});

setInterval(drawCanvas, 30);

</script>
</body>
</html>
